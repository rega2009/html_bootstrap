<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang - PWB Rega</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 60px 0;
        }
        .welcome-card {
            border: none;
            border-radius: 24px;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }
        .table {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        /* Mengganti warna kuning/abu kusam dengan warna tema modern */
        .thead-custom-main {
            background-color: #4f46e5 !important;
            color: white !important;
        }
        .thead-custom-sub {
            background-color: #f1f5f9 !important;
            color: #4f46e5 !important;
            font-weight: 700;
        }
        .table-hover tbody tr:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card welcome-card p-4 p-sm-5 text-center text-sm-start">
                    
                    <h1 class="fw-800 text-dark mb-2">Selamat Datang!</h1>
                    <p class="text-muted mb-4 fs-5">Terima Kasih Telah Berkunjung di Website Kami. Media Belajar Kita Bersama</p>
                    
                    <div class="table-responsive mt-2">
                        <table class="table table-bordered table-hover align-middle m-0">
                            <thead>
                                <tr class="thead-custom-main text-center">
                                    <th rowspan="2" class="align-middle" style="width: 25%;">Nama</th>
                                    <th colspan="3">Nilai</th>
                                </tr>
                                <tr class="thead-custom-sub text-center">
                                    <th>Kimia</th>
                                    <th>Fisika</th>
                                    <th>Biologi</th>
                                </tr>
                            </thead>
                            <tbody class="text-center">
                                <tr>
                                    <td class="fw-semibold text-start ps-3">Robby</td>
                                    <td>76</td>
                                    <td>80</td>
                                    <td>81</td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold text-start ps-3">Rendi</td>
                                    <td>84</td>
                                    <td>70</td>
                                    <td>75</td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold text-start ps-3">Alfian</td>
                                    <td>96</td>
                                    <td>70</td>
                                    <td>71</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
