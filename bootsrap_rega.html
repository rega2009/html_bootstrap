<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PWB Rega</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .card {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .form-label {
            color: #4338ca;
            font-weight: 600;
        }
        .form-control, .form-select {
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }
        .form-check-input:checked {
            background-color: #10b981;
            border-color: #10b981;
        }
        .btn-submit {
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background: #10b981;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 p-sm-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark m-0">Buat Account Baru</h2>
                        <p class="text-muted">Sign Up Form</p>
                    </div>

                    <form action="welcome.html">
                        <div class="mb-3">
                            <label class="form-label">First Name :</label>
                            <input type="text" class="form-control" placeholder="Nama depan">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name :</label>
                            <input type="text" class="form-control" placeholder="Nama belakang">
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Gender</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                                <label class="form-check-label" for="male">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                <label class="form-check-label" for="female">Female</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nationality</label>
                            <select class="form-select">
                                <option value="indonesia" selected>Indonesian</option>
                                <option value="germany">Germany</option>
                                <option value="japan">Japan</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Language Spoken</label>
                            <div class="form-check mb-1">
                                <input class="form-check-input lang-checkbox" type="checkbox" id="langIndo">
                                <label class="form-check-label" for="langIndo">Bahasa Indonesia</label>
                            </div>
                            <div class="form-check mb-1">
                                <input class="form-check-input lang-checkbox" type="checkbox" id="langEng">
                                <label class="form-check-label" for="langEng">English</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input lang-checkbox" type="checkbox" id="langJap">
                                <label class="form-check-label" for="langJap">Japan</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Bio</label>
                            <textarea class="form-control" rows="3" placeholder="Tulis bio singkat kamu..."></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-submit">Sign Up</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mengambil semua checkbox yang memiliki class 'lang-checkbox'
        const checkboxes = document.querySelectorAll('.lang-checkbox');

        checkboxes.forEach((checkbox) => {
            checkbox.addEventListener('change', function() {
                // Jika checkbox ini dicentang
                if (this.checked) {
                    // Matikan centang di semua checkbox lainnya
                    checkboxes.forEach((otherCheckbox) => {
                        if (otherCheckbox !== this) {
                            otherCheckbox.checked = false;
                        }
                    });
                }
            });
        });
    </script>

</body>
</html>
